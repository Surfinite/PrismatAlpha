name: Self-Play Data Generation

on:
  workflow_dispatch:
    inputs:
      games_per_job:
        description: 'Number of games per parallel job'
        default: '250'
        type: string
      think_time_ms:
        description: 'Base think time in ms (as if running locally)'
        default: '1000'
        type: string
      vm_think_multiplier:
        description: 'VM think multiplier (compensates for slower cloud CPUs vs Ryzen 5700X3D)'
        default: '1.3'
        type: string

jobs:
  selfplay:
    runs-on: windows-latest
    strategy:
      matrix:
        shard: [0, 1]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build (Static Release x86)
        shell: cmd
        run: >
          msbuild visualstudio\Prismata.sln
          /t:Prismata_Testing
          /p:Configuration="Static Release"
          /p:Platform=x86
          /p:PlatformToolset=v143
          /m

      - name: Verify neural weights
        shell: bash
        run: |
          if [ ! -f "bin/asset/config/neural_weights.bin" ]; then
            echo "::error::neural_weights.bin not found. Commit it to the repo first."
            echo "  1. Remove exclusion from .gitignore (already done)"
            echo "  2. git add bin/asset/config/neural_weights.bin"
            echo "  3. git commit and push"
            exit 1
          fi
          echo "neural_weights.bin found ($(wc -c < bin/asset/config/neural_weights.bin) bytes)"

      - name: Configure tournament
        shell: bash
        run: |
          GAMES=${{ inputs.games_per_job }}
          BASE_MS=${{ inputs.think_time_ms }}
          MULTIPLIER=${{ inputs.vm_think_multiplier }}

          # Apply VM think multiplier: e.g. 1000ms base * 1.3 = 1300ms on cloud
          SCALED_MS=$(python -c "print(int(${BASE_MS} * ${MULTIPLIER}))")
          echo "Think time: ${BASE_MS}ms local -> ${SCALED_MS}ms on VM (x${MULTIPLIER} multiplier)"

          # Disable all tournaments
          sed -i 's/"run":true/"run":false/g' bin/asset/config/config.txt

          # Enable SelfPlay_CI and set game count
          sed -i '/"name":"SelfPlay_CI"/s/"run":false/"run":true/' bin/asset/config/config.txt
          sed -i '/"name":"SelfPlay_CI"/s/"rounds":[0-9]*/"rounds":'"${GAMES}"'/' bin/asset/config/config.txt

          # Apply scaled think time to both self-play players
          sed -i '/"OriginalHardestAI_1s"/s/"TimeLimit":[0-9]*/"TimeLimit":'"${SCALED_MS}"'/' bin/asset/config/config.txt
          sed -i '/"OriginalHardestAI_Copy_1s"/s/"TimeLimit":[0-9]*/"TimeLimit":'"${SCALED_MS}"'/' bin/asset/config/config.txt

          echo "=== Active tournament config ==="
          grep -n "SelfPlay_CI" bin/asset/config/config.txt
          echo "=== Player think times ==="
          grep -n "OriginalHardestAI_1s\|OriginalHardestAI_Copy_1s" bin/asset/config/config.txt | head -2

      - name: Run self-play (shard ${{ matrix.shard }})
        shell: bash
        working-directory: bin
        run: |
          SCALED_MS=$(python -c "print(int(${{ inputs.think_time_ms }} * ${{ inputs.vm_think_multiplier }}))")
          echo "Starting self-play shard ${{ matrix.shard }}"
          echo "  Games: ${{ inputs.games_per_job }}"
          echo "  Think time: ${SCALED_MS}ms (base ${{ inputs.think_time_ms }}ms x${{ inputs.vm_think_multiplier }})"
          echo "  Threads: 2"
          ./Prismata_Testing.exe
          echo "Self-play complete."
        timeout-minutes: 330

      - name: List output files
        if: always()
        shell: bash
        run: |
          echo "=== Self-play output ==="
          find bin/training/data/selfplay/ -type f 2>/dev/null | head -50 || echo "No output files found"
          du -sh bin/training/data/selfplay/ 2>/dev/null || true

      - name: Upload self-play data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selfplay-shard-${{ matrix.shard }}
          path: bin/training/data/selfplay/
          retention-days: 90
          if-no-files-found: warn
